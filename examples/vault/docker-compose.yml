# Docker Compose for the HashiCorp Vault provider example.
#
# The whole config lives in one KV v2 secret at secret/checkout, one field per key.
#
# Usage:
#   docker compose up -d
#   docker compose exec vault vault kv put secret/checkout \
#     log_level=info \
#     request_timeout=30s \
#     rate_limit_rps=100 \
#     maintenance_mode=false \
#     database='{"host":"db.internal","port":5432,"max_open_conns":20}' \
#     allowed_origins='["https://app.example.com"]'
#   go run main.go
#
# Change a value to see the app log the event:
#   docker compose exec vault vault kv patch secret/checkout rate_limit_rps=500 maintenance_mode=true
#
# Tear down:
#   docker compose down -v

services:
  vault:
    image: hashicorp/vault:2.0
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      # Point the in-container CLI at the dev server over HTTP.
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_TOKEN: root
    ports:
      - "8200:8200"
