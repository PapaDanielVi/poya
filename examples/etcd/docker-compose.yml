# Docker Compose for etcd provider example
#
# Usage:
#   docker compose up -d
#   docker compose exec etcd etcdctl put myapp/db/host localhost
#   docker compose exec etcd etcdctl put myapp/db/port 5432
#   docker compose exec etcd etcdctl put myapp/verbose true
#   docker compose exec etcd etcdctl put myapp/timeout 30s
#   go run main.go
#
# Tear down:
#   docker compose down -v

services:
  etcd:
    image: gcr.io/etcd-development/etcd:v3.6.11
    command: >
      etcd
        --name etcd0
        --data-dir /etcd-data
        --listen-client-urls http://0.0.0.0:2379
        --advertise-client-urls http://0.0.0.0:2379
        --listen-peer-urls http://0.0.0.0:2380
        --initial-advertise-peer-urls http://0.0.0.0:2380
        --initial-cluster etcd0=http://0.0.0.0:2380
        --initial-cluster-token etcd-cluster-1
        --initial-cluster-state new
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/etcd-data

volumes:
  etcd-data:
