# Docker Compose for PostgreSQL provider example
#
# Usage:
#   docker compose up -d
#   # Wait for PostgreSQL to be ready, then seed the config table:
#   docker compose exec postgres psql -U postgres -d configdb -c "
#     CREATE TABLE IF NOT EXISTS config (
#       config_key   VARCHAR(255) PRIMARY KEY,
#       config_value TEXT
#     );
#     INSERT INTO config VALUES ('myapp/db/host', 'localhost');
#     INSERT INTO config VALUES ('myapp/db/port', '5432');
#     INSERT INTO config VALUES ('myapp/verbose', 'true');
#     INSERT INTO config VALUES ('myapp/timeout', '30s')
#     ON CONFLICT (config_key) DO NOTHING;
#   "
#   go run main.go
#
# Tear down:
#   docker compose down -v

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: configdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
