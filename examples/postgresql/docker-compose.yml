# Docker Compose for the PostgreSQL provider example.
#
# Usage:
#   docker compose up -d
#   # Wait for PostgreSQL to accept connections, then seed the config table:
#   docker compose exec -T postgres psql -U postgres -d configdb <<'SQL'
#   CREATE TABLE IF NOT EXISTS config (config_key VARCHAR(255) PRIMARY KEY, config_value TEXT);
#   INSERT INTO config VALUES
#     ('checkout/log_level', 'info'),
#     ('checkout/request_timeout', '30s'),
#     ('checkout/rate_limit_rps', '100'),
#     ('checkout/maintenance_mode', 'false'),
#     ('checkout/database', '{"host":"db.internal","port":5432,"max_open_conns":20}'),
#     ('checkout/allowed_origins', '["https://app.example.com"]')
#   ON CONFLICT (config_key) DO UPDATE SET config_value = EXCLUDED.config_value;
#   SQL
#   go run main.go
#
# Tear down:
#   docker compose down -v

services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: configdb
    ports:
      - "5432:5432"
    volumes:
      # postgres:18+ stores data under /var/lib/postgresql/<version>/docker, so
      # the volume must be mounted at the parent dir, not /var/lib/postgresql/data.
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
